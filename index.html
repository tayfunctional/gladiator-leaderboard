<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gladiator Showdown — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#141110; --bg2:#1c1815; --surface:#221d19; --surface2:#2a2420;
  --line:#37302a; --ink:#f3eee8; --mut:#9a9088; --mut2:#6f655d;
  --acc:#d85a30; --acc-soft:#3a221a;
  --gold:#e8b23a; --silver:#cdd2d8; --bronze:#cd7f43;
  --elite:#d85a30; --adv:#b9b2a8; --based:#27a980;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Inter',system-ui,sans-serif; line-height:1.4;
  min-height:100vh; padding-bottom:48px;
  background-image:radial-gradient(900px 500px at 50% -200px, #2a1d16 0%, transparent 70%);
}
.wrap{max-width:760px;margin:0 auto;padding:0 16px}

/* header */
header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#141110 70%,rgba(20,17,16,0.0));
  padding:14px 0 10px;backdrop-filter:blur(4px)}
.brand{display:flex;align-items:center;gap:12px}
.brand img{height:46px;width:auto;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.brand .t1{font-family:'Oswald';font-weight:700;letter-spacing:.04em;font-size:20px;line-height:1;text-transform:uppercase}
.brand .t2{font-family:'Oswald';font-weight:500;letter-spacing:.22em;font-size:11px;color:var(--acc);text-transform:uppercase;margin-top:3px}
.live{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--mut);font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 0 rgba(216,90,48,.6);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(216,90,48,.55)}70%{box-shadow:0 0 0 9px rgba(216,90,48,0)}100%{box-shadow:0 0 0 0 rgba(216,90,48,0)}}

/* tabs */
.tabs{display:flex;gap:6px;margin:14px 0 4px;background:var(--bg2);padding:5px;border-radius:12px;border:1px solid var(--line)}
.tab{flex:1;text-align:center;padding:9px 6px;border-radius:8px;font-family:'Oswald';font-weight:600;font-size:14px;
  letter-spacing:.06em;text-transform:uppercase;color:var(--mut);cursor:pointer;border:none;background:none;transition:.15s}
.tab[data-d="ELITE"].on{background:var(--elite);color:#fff}
.tab[data-d="ADVANCED"].on{background:var(--adv);color:#1a1a1a}
.tab[data-d="BASED"].on{background:var(--based);color:#fff}
.tab:not(.on):hover{color:var(--ink)}

.ctrl{display:flex;align-items:center;gap:10px;margin:10px 0 0}
.ctrl-l{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mut2);min-width:58px}
.seg{display:flex;gap:4px;background:var(--bg2);padding:4px;border-radius:10px;border:1px solid var(--line);flex:1}
.seg button{flex:1;padding:7px 4px;border:none;background:none;color:var(--mut);font-family:'Inter';font-weight:600;
  font-size:12px;letter-spacing:.03em;border-radius:7px;cursor:pointer;transition:.15s}
.seg button.on{background:var(--surface2);color:var(--ink)}
.seg button:not(.on):hover{color:var(--ink)}
.grouphd{font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mut);margin:16px 4px 2px;display:flex;align-items:center;gap:8px}
.grouphd::after{content:"";flex:1;height:1px;background:var(--line)}
.grouphd:first-child{margin-top:6px}
.slotnote{font-size:11px;color:var(--mut2);text-align:center;margin:8px 0 2px;letter-spacing:.03em}

/* column head */
.colhead{display:grid;grid-template-columns:38px 1fr auto;gap:10px;padding:6px 12px;color:var(--mut2);
  font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase}
.colhead .r{text-align:right}

/* rows */
.list{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.row{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.15s}
.row:hover{border-color:#473d35}
.rowtop{display:grid;grid-template-columns:38px 1fr auto;gap:10px;align-items:center;padding:12px}
.rank{font-family:'Oswald';font-weight:700;font-size:24px;line-height:1;text-align:center;color:var(--mut)}
.row.p1 .rank{color:var(--gold)} .row.p2 .rank{color:var(--silver)} .row.p3 .rank{color:var(--bronze)}
.row.p1{border-color:#5a4620;background:linear-gradient(180deg,#2a2114,#221d19)}
.row.p2{border-color:#3f4146}.row.p3{border-color:#4a3526}
.name{font-weight:600;font-size:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gbadge{font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 6px;border-radius:5px;background:var(--surface2);color:var(--mut);border:1px solid var(--line)}
.chips{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.chip{font-size:10px;color:var(--mut);background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-weight:500}
.chip b{color:var(--ink);font-weight:700}
.total{text-align:right}
.total .tn{font-family:'Oswald';font-weight:700;font-size:26px;line-height:1;color:var(--acc)}
.total .tl{font-size:9px;color:var(--mut2);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

/* expand */
.detail{display:none;border-top:1px solid var(--line);padding:10px 12px 12px;background:var(--bg2)}
.row.open .detail{display:block}
.drow{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
.drow:last-child{border-bottom:none}
.drow .wn{color:var(--mut);font-weight:500}
.drow .wv{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
.drow .wp{font-family:'Oswald';font-weight:700;color:var(--acc);min-width:34px;text-align:right}

/* states */
.msg{text-align:center;color:var(--mut);padding:40px 16px;font-size:14px;line-height:1.6}
.msg b{color:var(--ink)}
.setup{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-top:16px;font-size:13px;color:var(--mut);line-height:1.6}
.setup code{background:var(--bg);padding:2px 6px;border-radius:5px;color:var(--acc);font-size:12px}
footer{text-align:center;color:var(--mut2);font-size:11px;margin-top:22px;letter-spacing:.03em}
.demoflag{display:inline-block;margin-left:8px;font-size:10px;color:#1a1a1a;background:var(--gold);padding:2px 7px;border-radius:5px;font-weight:700;letter-spacing:.05em}
</style>
</head>

<script>
/* ============================================================
   KONFIGURATION
   Liest direkt aus deinem Sheet "Gladiator Showdown 2026",
   Tabelle "Teilnehmer". Du musst hier nichts ändern.
   Damit es funktioniert: Sheet rechts oben TEILEN ->
   "Jeder mit dem Link" -> Betrachter.
   ============================================================ */
const SHEET_ID  = "1Bmk3mEmrFWcn0tGghQ8NcS5oKI9M082HF8FeYcjrIgs";
const SHEET_TAB = "Teilnehmer";
const REFRESH_MS = 25000;

/* In der Teilnehmer-Tabelle bleiben A-F wie sie sind:
   Vorname | Name | E-Mail | Startgebühr gezahlt? | Liga | F/M
   Setze die Kopfzeilen G1 bis L1 EXAKT auf:
   G1: 26.1A_s   (Sprint-Gesamtzeit Sek., Frauen schon x0,90)
   H1: 26.1B_reps
   I1: 26.2_reps
   J1: 26.3_time (mm:ss, nur wenn durchgekommen)
   K1: 26.3_pts  (nur bei Time Cap)
   L1: 26.4_reps (nur bei Rainy Day)
   Spalte M (Gesamtpunkte) wird nicht mehr gebraucht, die App rechnet selbst. */

const DEMO = [
  ["Marco K.","Elite","M","31.8","58","142","17:42","","",],
  ["Lena S.","Elite","F","30.2","49","151","18:55","","",],
  ["Deniz A.","Elite","M","33.5","61","138","","305",""],
  ["Tobias R.","Elite","M","32.1","54","129","19:10","",""],
  ["Sara B.","Elite","F","31.0","47","148","18:30","",""],
  ["Jan P.","Advanced","M","30.5","52","133","15:20","",""],
  ["Nina H.","Advanced","F","29.7","45","140","15:58","",""],
  ["Kevin M.","Advanced","M","31.2","57","126","","248"],
  ["Laura T.","Advanced","F","30.9","43","135","16:40","",""],
  ["Felix W.","Based","M","28.9","48","120","13:05","",""],
  ["Mia D.","Based","F","27.6","41","128","13:40","",""],
  ["Paul G.","Based","M","29.4","53","115","","165"],
].map(r=>rowObj(["Name","Division","Gender","26.1A_s","26.1B_reps","26.2_reps","26.3_time","26.3_pts","26.4_reps"], r));

function rowObj(keys, vals){const o={};keys.forEach((k,i)=>o[norm(k)]=(vals[i]||"").trim());return o;}
function norm(s){return String(s).trim().toLowerCase().replace(/\s+/g,"").replace(/[.]/g,"");}

/* ---------- Google gviz JSON ---------- */
function parseGviz(text){
  const s=text.indexOf("{"), e=text.lastIndexOf("}");
  if(s<0||e<0) throw new Error("bad response");
  const j=JSON.parse(text.slice(s,e+1));
  const cols=(j.table.cols||[]).map(c=>norm(c.label||c.id||""));
  return (j.table.rows||[]).map(r=>{
    const o={};(r.c||[]).forEach((cell,i)=>{ if(!cols[i])return;
      o[cols[i]]= cell ? String(cell.f!=null?cell.f:(cell.v!=null?cell.v:"")) : ""; });
    return o;
  }).filter(o=>Object.values(o).some(v=>v&&String(v).trim()));
}

/* ---------- helpers ---------- */
const num=v=>{if(v===undefined||v===null||v==="")return null;const n=parseFloat(String(v).replace(",","."));return isNaN(n)?null:n;};
function timeSec(v){if(!v)return null;v=String(v).trim();if(v.includes(":")){const p=v.split(":").map(Number);if(p.some(isNaN))return null;return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+p[1];}return num(v);}

/* competition ranking (1224). valueFn returns number or null. null => worst. */
function rankBy(items, valueFn, dir){
  const arr=items.map(it=>({it,v:valueFn(it)}));
  const valued=arr.filter(x=>x.v!==null&&x.v!==undefined);
  const nulls=arr.filter(x=>x.v===null||x.v===undefined);
  valued.sort((a,b)=>dir==="asc"?a.v-b.v:b.v-a.v);
  const m=new Map();let rank=0,seen=0,prev=null;
  for(const x of valued){seen++;if(prev===null||x.v!==prev){rank=seen;prev=x.v;}m.set(x.it,rank);}
  const worst=items.length;nulls.forEach(x=>m.set(x.it,worst));
  return m;
}

function w3val(a){const t=timeSec(a["263_time"]);if(t!==null)return t;const p=num(a["263_pts"]);if(p!==null)return 1e7-p;return null;}
function coreRank(athletes){
  if(!athletes.length)return {rows:[],slot:null,events:[]};
  const rainy=athletes.some(a=>num(a["264_reps"])!==null);
  const defs=[];
  if(rainy){
    defs.push({label:"26.4", map:rankBy(athletes,a=>num(a["264_reps"]),"desc"), raw:a=>a["264_reps"]?a["264_reps"]+" Reps":"—"});
  }else{
    defs.push({label:"26.1A", map:rankBy(athletes,a=>timeSec(a["261a_s"]),"asc"), raw:a=>a["261a_s"]?a["261a_s"]+" s":"—"});
    defs.push({label:"26.1B", map:rankBy(athletes,a=>num(a["261b_reps"]),"desc"), raw:a=>a["261b_reps"]?a["261b_reps"]+" Reps":"—"});
  }
  defs.push({label:"26.2", map:rankBy(athletes,a=>num(a["262_reps"]),"desc"), raw:a=>a["262_reps"]?a["262_reps"]+" Reps":"—"});
  defs.push({label:"26.3", map:rankBy(athletes,a=>w3val(a),"asc"), raw:w3raw});
  const data=athletes.map(a=>{
    const places=defs.map(d=>d.map.get(a));
    return {a, places, total:places.reduce((s,v)=>s+v,0)};
  });
  data.sort((x,y)=> x.total-y.total || cmpPlaces(x.places,y.places));
  let rank=0,seen=0,prevKey=null;
  data.forEach(d=>{seen++;const key=d.total+"|"+d.places.slice().sort((a,b)=>a-b).join(",");
    if(prevKey===null||key!==prevKey){rank=seen;prevKey=key;}d.place=rank;});
  return {rows:data, slot: rainy?"Rainy Day (26.4)":"Highway to Hell (26.1A + 26.1B getrennt)", events:defs};
}
function cmpPlaces(a,b){const x=a.slice().sort((m,n)=>m-n),y=b.slice().sort((m,n)=>m-n);
  for(let i=0;i<x.length;i++){if(x[i]!==y[i])return x[i]-y[i];}return 0;}

/* ---------- render ---------- */
let CURRENT="ELITE", ALL=[];
const MODE={ELITE:"mixed", ADVANCED:"split", BASED:"mixed"};
let GFILTER="all";
function ord(n){return n+".";}
function gender(a){const g=(a["gender"]||a["f/m"]||"").toUpperCase();return g==="W"?"F":(g==="F"||g==="M"?g:"");}
function displayName(a){return ((((a["vorname"]||"")+" "+(a["name"]||"")).trim())||a["name"]||"—");}

function rowHTML(d, events){
  const a=d.a; const g=gender(a);
  const gb=g?`<span class="gbadge">${g}</span>`:"";
  const cls=d.place===1?"p1":d.place===2?"p2":d.place===3?"p3":"";
  const chips=events.map((e,i)=>`<span class="chip">${e.label} <b>${ord(d.places[i])}</b></span>`).join("");
  const details=events.map((e,i)=>drow(e.label, e.raw(a), d.places[i])).join("");
  return `<div class="row ${cls}" onclick="this.classList.toggle('open')">
    <div class="rowtop">
      <div class="rank">${d.place}</div>
      <div><div class="name">${esc(displayName(a))}${gb}</div><div class="chips">${chips}</div></div>
      <div class="total"><div class="tn">${d.total}</div><div class="tl">Rang-Summe</div></div>
    </div>
    <div class="detail">${details}</div>
  </div>`;
}
function listHTML(rows, events){return '<div class="list">'+rows.map(d=>rowHTML(d,events)).join("")+'</div>';}

function render(){
  syncControls();
  const board=document.getElementById("board");
  const div=ALL.filter(a=>{const D=((a["liga"]||a["division"]||"")).toUpperCase();return D.startsWith(CURRENT.slice(0,3))||D===CURRENT;});
  const base=coreRank(div);
  document.getElementById("slotnote").textContent = base.slot? ("Erstes Workout: "+base.slot+(MODE[CURRENT]==="split"?"  ·  getrennte Wertung":"  ·  gemischte Wertung")) : "";
  if(!div.length){
    board.innerHTML = SHEET_ID ? '<div class="msg">Noch keine Athleten in dieser Division.<br>Sobald Liga und Scores im Sheet stehen, erscheinen sie hier.</div>' : setupHtml();
    return;
  }
  const colhead='<div class="colhead"><div>#</div><div>Athlet</div><div class="r">Punkte</div></div>';
  if(MODE[CURRENT]==="mixed"){
    let rows=base.rows;
    if(GFILTER!=="all") rows=rows.filter(d=>gender(d.a)===GFILTER);
    board.innerHTML = rows.length? colhead+listHTML(rows, base.events)
      : '<div class="msg">Keine '+(GFILTER==="F"?"Frauen":"Männer")+' in dieser Division.</div>';
    return;
  }
  // split: rank within gender
  const groups=[["F","Frauen"],["M","Männer"]].filter(([k])=> GFILTER==="all"||GFILTER===k);
  let html=colhead, any=false;
  groups.forEach(([k,label])=>{
    const sub=div.filter(a=>gender(a)===k);
    if(!sub.length)return;
    const r=coreRank(sub);
    any=true;
    if(GFILTER==="all") html+=`<div class="grouphd">${label}</div>`;
    html+=listHTML(r.rows, r.events);
  });
  board.innerHTML = any? html : '<div class="msg">Keine Athleten für diese Auswahl.</div>';
}
function syncControls(){
  document.querySelectorAll("#modeseg button").forEach(b=>b.classList.toggle("on",b.dataset.m===MODE[CURRENT]));
  document.querySelectorAll("#gseg button").forEach(b=>b.classList.toggle("on",b.dataset.g===GFILTER));
}
function w3raw(a){if(a["263_time"])return a["263_time"]+" min";if(a["263_pts"])return a["263_pts"]+" P (Cap)";return "—";}
function drow(n,v,p){return `<div class="drow"><div class="wn">${n}</div><div class="wv">${esc(v)}</div><div class="wp">${ord(p)}</div></div>`;}
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function setupHtml(){return `<div class="setup"><b style="color:var(--ink)">Fast fertig.</b> Das Sheet ist verbunden. Teile es noch über <code>Jeder mit dem Link → Betrachter</code>, damit die Daten geladen werden. Bis dahin siehst du Demo-Daten.</div>`;}

/* ---------- load ---------- */
let LOADED=false;
function sheetUrl(){return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?headers=1&sheet=${encodeURIComponent(SHEET_TAB)}&tqx=reqId:${Date.now()}`;}
function useDemo(){ALL=DEMO;document.getElementById("demoflag").innerHTML='<span class="demoflag">Demo</span>';mark();render();}
async function load(){
  try{
    if(!SHEET_ID){ useDemo(); return; }
    const res=await fetch(sheetUrl());
    const txt=await res.text();
    const data=parseGviz(txt);
    if(!data.length) throw new Error("empty");
    ALL=data; LOADED=true; document.getElementById("demoflag").innerHTML=""; mark(); render();
  }catch(e){
    if(LOADED){ mark(); render(); } else { useDemo(); }
  }
}
function mark(){const d=new Date();document.getElementById("upd").textContent=
  "aktualisiert "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}

document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest(".tab");if(!b)return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  b.classList.add("on");CURRENT=b.dataset.d;render();
});
document.getElementById("modeseg").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;MODE[CURRENT]=b.dataset.m;render();
});
document.getElementById("gseg").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;GFILTER=b.dataset.g;render();
});

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
